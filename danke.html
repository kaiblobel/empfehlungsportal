<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#FAF8F5" />
  <title>Danke für deine Empfehlung · Kai Blobel</title>
  <link rel="stylesheet" href="css/empfehlen.css?v=33" />
</head>
<body data-page="danke">

  <main class="f-page">
    <div class="f-check">
      <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="5 12 10 17 19 8" stroke-linecap="round" stroke-linejoin="round" /></svg>
    </div>
    <span class="f-eyebrow-d">Empfehlung angekommen</span>
    <h1 class="f-h1">Danke für dein <em style="font-style:italic;font-weight:300;">Vertrauen</em>.</h1>
    <p class="f-lede">Ich werde mich in den nächsten Tagen persönlich melden.</p>

    <div class="f-hairline-d"></div>

    <p class="f-signature" data-bb="name">Kai Blobel</p>
  </main>

  <script src="js/config.js"></script>
  <script type="module">
    import { getEmpfehlerByCode, getBeraterPublicById } from './js/supabase.js';
    import { applyBeraterBrand } from './js/berater-brand.js';
    (async () => {
      let code = null;
      try { code = localStorage.getItem('empfehler_code'); } catch (_) {}
      if (!code) return;
      const { data: emp } = await getEmpfehlerByCode(code);
      if (!emp?.berater_id) return;
      const { data: berater } = await getBeraterPublicById(emp.berater_id);
      if (berater) applyBeraterBrand(berater);
    })();
  </script>
</body>
</html>
