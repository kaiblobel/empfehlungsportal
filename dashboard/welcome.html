<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f5f7" />
  <title>Willkommen · Empfehlungsportal</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="stylesheet" href="../css/style.css?v=32" />
  <link rel="stylesheet" href="../css/dashboard.css?v=41" />
  <script src="../js/config.js"></script>
</head>
<body>

  <main class="dashboard-login">
    <section class="login-card" style="max-width: 440px;">
      <h1 id="welcomeTitle">Willkommen.</h1>
      <p class="subtle" id="welcomeSub">Lege dein Passwort fest. Du brauchst es bei jedem weiteren Login.</p>

      <form id="passwordForm" novalidate>
        <input id="password" type="password" autocomplete="new-password" placeholder="Neues Passwort (mind. 8 Zeichen)" required minlength="8" />
        <input id="password2" type="password" autocomplete="new-password" placeholder="Passwort wiederholen" required minlength="8" />
        <div class="login-error" id="errBox"></div>
        <button type="submit" class="btn btn-primary">Passwort setzen und loslegen</button>
      </form>

      <p class="subtle" style="margin-top: 20px; font-size: 12px;">Falls du diesen Link versehentlich erhalten hast, schließ einfach das Fenster.</p>
    </section>
  </main>

  <script type="module">
    import { supabase } from '../js/supabase.js';

    const titleEl = document.getElementById('welcomeTitle');
    const subEl = document.getElementById('welcomeSub');
    const form = document.getElementById('passwordForm');
    const errBox = document.getElementById('errBox');

    // Session aus URL-Fragment oder Storage holen
    const { data: { session } } = await supabase.auth.getSession();

    if (!session) {
      titleEl.textContent = 'Hoppla.';
      subEl.textContent = 'Der Einladungs-Link ist abgelaufen oder ungültig. Bitte frage Kai um einen neuen.';
      form.style.display = 'none';
    } else {
      // Berater-Profil holen falls vorhanden
      const { data: berater } = await supabase
        .from('berater')
        .select('name, rolle')
        .eq('auth_user_id', session.user.id)
        .maybeSingle();

      if (berater?.name) {
        const firstName = berater.name.split(' ')[0];
        titleEl.textContent = `Willkommen, ${firstName}.`;
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errBox.classList.remove('show');

      const pw1 = document.getElementById('password').value;
      const pw2 = document.getElementById('password2').value;

      if (pw1.length < 8) {
        errBox.textContent = 'Mindestens 8 Zeichen, bitte.';
        errBox.classList.add('show');
        return;
      }
      if (pw1 !== pw2) {
        errBox.textContent = 'Die beiden Passwörter stimmen nicht überein.';
        errBox.classList.add('show');
        return;
      }

      const btn = form.querySelector('button');
      btn.disabled = true;
      btn.textContent = 'Setze Passwort…';

      const { error } = await supabase.auth.updateUser({ password: pw1 });
      if (error) {
        errBox.textContent = error.message || 'Konnte nicht gesetzt werden.';
        errBox.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Passwort setzen und loslegen';
        return;
      }

      window.location.href = '../hub.html';
    });
  </script>
</body>
</html>
