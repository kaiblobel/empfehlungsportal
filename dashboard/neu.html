<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f5f7" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Neue Empfehlung · Empfehlungsportal</title>
  <link rel="stylesheet" href="../css/style.css?v=32" />
  <link rel="stylesheet" href="../css/dashboard.css?v=41" />
  <script src="../js/config.js"></script>
</head>
<body class="has-app-nav">

  <div id="appNav"></div>
  <script type="module" src="../js/nav.js?v=43"></script>

  <div class="app-shell">
    <header class="app-header">
      <button class="detail-back" id="backBtn">← Zurück</button>
      <div class="app-header-right">
        <a href="../hub.html" class="btn-hub-back" title="Zum Hub">⌂ <span class="lbl">Hub</span></a>
        <button class="btn-logout" id="logoutBtn">Abmelden</button>
      </div>
    </header>

    <main class="app-content">
      <h1 class="detail-headline">Neue Empfehlung</h1>
      <p class="page-subtext" style="margin-top: -8px;">Manuell anlegen, z. B. nach einem Telefon-Tipp.</p>

      <form id="neuForm" novalidate style="display: flex; flex-direction: column; gap: 14px;">

        <div class="field-card">
          <label for="vorname">Vorname *</label>
          <input id="vorname" type="text" required autocomplete="given-name" />
        </div>
        <div class="field-card">
          <label for="nachname">Nachname *</label>
          <input id="nachname" type="text" required autocomplete="family-name" />
        </div>
        <div class="field-card">
          <label for="telefon">Telefon *</label>
          <input id="telefon" type="tel" required inputmode="tel" placeholder="+49" autocomplete="tel" />
        </div>

        <div class="detail-field">
          <label for="typSel">Typ</label>
          <select id="typSel">
            <option value="direkt">Direkt-Empfehlung</option>
            <option value="info">Info-Variante</option>
          </select>
        </div>

        <div class="field-card">
          <label for="empfehlerName">Promoter (optional)</label>
          <input id="empfehlerName" type="text" autocomplete="off" />
        </div>

        <div class="field-card">
          <label for="empfaengerBeruf">Beruf / Position (optional)</label>
          <input id="empfaengerBeruf" type="text" autocomplete="off" placeholder="z. B. Architektin, selbständig" />
        </div>

        <div class="detail-field">
          <label for="empfaengerVerbindung">Verbindung zum Promoter (optional)</label>
          <select id="empfaengerVerbindung">
            <option value="">— wählen —</option>
            <option value="Familie">Familie</option>
            <option value="Lebenspartner">Lebenspartner</option>
            <option value="Freund">Freund / Freundin</option>
            <option value="Arbeitskollege">Arbeitskollege / -kollegin</option>
            <option value="Vereinskollege">Verein / Sport</option>
            <option value="Nachbar">Nachbar / Nachbarin</option>
            <option value="Bekannter">Bekannte / Bekannter</option>
            <option value="Sonstiges">Sonstiges</option>
          </select>
        </div>

        <div class="detail-field">
          <label for="empfaengerKontext">Kontext für Gespräch (optional)</label>
          <textarea id="empfaengerKontext" maxlength="300" placeholder="z. B. Kauft gerade ein Haus, macht sich selbständig…"></textarea>
        </div>

        <div class="field-card" style="flex-direction:row;align-items:center;gap:12px;">
          <input type="checkbox" id="empfehlerVorinformiert" style="width:18px;height:18px;cursor:pointer;flex-shrink:0;" />
          <label for="empfehlerVorinformiert" style="cursor:pointer;font-weight:500;font-size:14px;">Promoter hat den Kontakt schon vorinformiert</label>
        </div>

        <div class="detail-field">
          <label for="besteErreichbarkeit">Beste Erreichbarkeit (optional)</label>
          <select id="besteErreichbarkeit">
            <option value="">— keine Angabe —</option>
            <option value="vormittag">Vormittag (8–12 Uhr)</option>
            <option value="mittag">Mittag (12–14 Uhr)</option>
            <option value="nachmittag">Nachmittag (14–18 Uhr)</option>
            <option value="abend">Abend (18–21 Uhr)</option>
            <option value="we">Am Wochenende</option>
            <option value="egal">Egal</option>
          </select>
        </div>

        <div class="detail-field">
          <label for="bevorzugterKanal">Bevorzugter Kanal (optional)</label>
          <select id="bevorzugterKanal">
            <option value="">— keine Angabe —</option>
            <option value="anruf">Telefon-Anruf</option>
            <option value="whatsapp">WhatsApp</option>
            <option value="sms">SMS</option>
            <option value="email">Email</option>
            <option value="egal">Egal</option>
          </select>
        </div>

        <div class="detail-field">
          <label for="notiz">Notiz (intern, optional)</label>
          <textarea id="notiz" placeholder="Was du dir merken willst, Folgetermin…"></textarea>
        </div>

        <div class="login-error" id="errBox"></div>

        <div class="detail-actions">
          <button type="submit" class="btn btn-primary" id="saveBtn">Empfehlung anlegen</button>
          <button type="button" class="btn btn-secondary" id="cancelBtn">Abbrechen</button>
        </div>
      </form>
    </main>
  </div>

  <script type="module">
    import { requireAuth, logout, updateStatus, toast } from '../js/dashboard.js';
    import { createEmpfehlung } from '../js/supabase.js';

    document.getElementById('logoutBtn').addEventListener('click', logout);
    document.getElementById('backBtn').addEventListener('click', () => history.back());
    document.getElementById('cancelBtn').addEventListener('click', () => window.location.href = 'overview.html');

    (async () => { await requireAuth(); })();

    // Vorbefüllung aus URL-Parametern (Brücke aus dem Berater-Cockpit, Telefon-Fokusmodus)
    (() => {
      const p = new URLSearchParams(location.search);
      const set = (id, key) => { const v = p.get(key); if (v) { const el = document.getElementById(id); if (el) el.value = v; } };
      set('vorname', 'vorname');
      set('nachname', 'nachname');
      set('telefon', 'telefon');
      set('empfehlerName', 'empfehler');
      set('empfaengerKontext', 'kontext');
    })();

    function sanitizePhone(raw) {
      return (raw || '').replace(/[^\d+]/g, '').replace(/^00/, '+').replace(/^\+/, '');
    }

    document.getElementById('neuForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errBox = document.getElementById('errBox');
      errBox.classList.remove('show');

      const vorname = document.getElementById('vorname').value.trim();
      const nachname = document.getElementById('nachname').value.trim();
      const telefon = sanitizePhone(document.getElementById('telefon').value);
      const typ = document.getElementById('typSel').value;
      const empfehler = document.getElementById('empfehlerName').value.trim();
      const notiz = document.getElementById('notiz').value.trim();
      const beruf = document.getElementById('empfaengerBeruf').value.trim();
      const verbindung = document.getElementById('empfaengerVerbindung').value;
      const kontext = document.getElementById('empfaengerKontext').value.trim();
      const vorinformiert = document.getElementById('empfehlerVorinformiert').checked;
      const erreichbarkeit = document.getElementById('besteErreichbarkeit').value;
      const kanal = document.getElementById('bevorzugterKanal').value;

      if (!vorname || !nachname || !telefon) {
        errBox.textContent = 'Vorname, Nachname und Telefon sind Pflicht.';
        errBox.classList.add('show');
        return;
      }

      const btn = document.getElementById('saveBtn');
      btn.disabled = true;
      btn.textContent = 'Lege an…';

      const { data, error } = await createEmpfehlung({
        empfaenger_name: `${vorname} ${nachname}`,
        empfaenger_telefon: telefon,
        empfehler_name: empfehler || null,
        nachricht: null,
        typ,
        empfaenger_beruf: beruf || null,
        empfaenger_verbindung: verbindung || null,
        empfaenger_kontext: kontext || null,
        empfehler_vorinformiert: vorinformiert,
        beste_erreichbarkeit: erreichbarkeit || null,
        bevorzugter_kanal: kanal || null,
      });

      if (error || !data) {
        errBox.textContent = 'Konnte nicht angelegt werden: ' + (error?.message || 'unbekannt');
        errBox.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Empfehlung anlegen';
        return;
      }

      if (notiz) {
        await updateStatus(data.id, 'offen', notiz);
      }

      window.location.href = `detail.html?id=${data.id}`;
    });
  </script>
</body>
</html>
