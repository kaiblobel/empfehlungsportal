<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f5f7" />
  <title>Login · Empfehlungsportal</title>
  <meta name="robots" content="noindex,nofollow" />
  <meta property="og:title" content="Empfehlungsportal · Berater-Bereich" />
  <meta property="og:image" content="https://empfehlungsportal.vercel.app/assets/images/og-cover.png" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
  <script src="../js/config.js"></script>
</head>
<body>

  <main class="dashboard-login">
    <section class="login-card">
      <img class="login-photo" id="loginPhoto" src="" alt="Berater" />
      <h1>Empfehlungsportal</h1>
      <p class="subtle">Dein persönlicher Überblick</p>

      <form id="loginForm" novalidate>
        <input id="email" type="email" autocomplete="email" placeholder="E-Mail" required />
        <input id="password" type="password" autocomplete="current-password" placeholder="Passwort" required />
        <div class="login-error" id="loginError"></div>
        <button type="submit" class="btn btn-primary">Anmelden</button>
      </form>
    </section>
  </main>

  <script type="module">
    import { login, redirectIfAuthed } from '../js/dashboard.js';

    document.getElementById('loginPhoto').src = window.ENV_BERATER_FOTO || '';

    redirectIfAuthed();

    const form = document.getElementById('loginForm');
    const errBox = document.getElementById('loginError');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errBox.classList.remove('show');
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) {
        errBox.textContent = 'Bitte E-Mail und Passwort eingeben.';
        errBox.classList.add('show');
        return;
      }
      const { error } = await login(email, password);
      if (error) {
        errBox.textContent = error.message === 'Invalid login credentials'
          ? 'E-Mail oder Passwort falsch.'
          : (error.message || 'Anmeldung fehlgeschlagen.');
        errBox.classList.add('show');
        return;
      }
      window.location.href = 'overview.html';
    });
  </script>
</body>
</html>
