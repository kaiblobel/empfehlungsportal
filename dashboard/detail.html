<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f5f7" />
  <title>Empfehlung · Empfehlungsportal</title>
  <link rel="stylesheet" href="../css/style.css?v=13c" />
  <link rel="stylesheet" href="../css/dashboard.css?v=13c" />
  <script src="../js/config.js"></script>
</head>
<body class="has-app-nav">

  <div id="appNav"></div>
  <script type="module" src="../js/nav.js?v=13c"></script>

  <div class="app-shell">
    <header class="app-header">
      <button class="detail-back" id="backBtn">← Zurück</button>
      <div class="app-header-right">
        <a href="../hub.html" class="btn-hub-back" title="Zum Hub">⌂ <span class="lbl">Hub</span></a>
        <button class="btn-logout" id="logoutBtn">Abmelden</button>
      </div>
    </header>

    <main class="app-content" id="content">
      <div class="spinner"></div>
    </main>
  </div>

  <script type="module">
    import {
      requireAuth, logout, loadDetail, updateStatus,
      formatDate, getStatusBadge, statusLabel, whatsappLink, toast,
    } from '../js/dashboard.js';

    document.getElementById('logoutBtn').addEventListener('click', logout);
    document.getElementById('backBtn').addEventListener('click', () => {
      if (document.referrer && document.referrer.includes('/dashboard/')) {
        history.back();
      } else {
        window.location.href = 'overview.html';
      }
    });

    const id = new URLSearchParams(window.location.search).get('id');
    if (!id) {
      document.getElementById('content').innerHTML = '<div class="empty-state">Keine ID übergeben.</div>';
    }

    (async () => {
      const session = await requireAuth();
      if (!session) return;
      if (!id) return;

      const r = await loadDetail(id);
      const content = document.getElementById('content');
      if (!r) {
        content.innerHTML = '<div class="empty-state">Empfehlung nicht gefunden.</div>';
        return;
      }

      const empfehlerLink = r.link_token
        ? `${window.location.origin}/empfaenger.html?token=${r.link_token}`
        : '';

      content.innerHTML = `
        <h1 class="detail-headline">${escapeHtml(r.empfaenger_name || '–')}</h1>

        <div class="detail-info">
          <div class="detail-row">
            <span class="label">Status</span>
            <span class="value">${getStatusBadge(r.status)}</span>
          </div>
          <div class="detail-row">
            <span class="label">Telefon</span>
            <span class="value">${escapeHtml(r.empfaenger_telefon || '–')}</span>
          </div>
          <div class="detail-row">
            <span class="label">Typ</span>
            <span class="value">${r.typ === 'info' ? 'Info-Variante' : 'Direkt-Empfehlung'}</span>
          </div>
          <div class="detail-row">
            <span class="label">Empfehler</span>
            <span class="value">${escapeHtml(r.empfehler_name || '–')}</span>
          </div>
          <div class="detail-row">
            <span class="label">Erstellt</span>
            <span class="value">${formatDate(r.created_at)}</span>
          </div>
          <div class="detail-row">
            <span class="label">Link geöffnet</span>
            <span class="value">${r.link_geoeffnet ? 'Ja · ' + formatDate(r.link_geoeffnet_at) : 'Nein'}</span>
          </div>
          <div class="detail-row">
            <span class="label">Klicks</span>
            <span class="value">${r.link_klicks || 0}</span>
          </div>
          <div class="detail-row">
            <span class="label">Interesse bekundet</span>
            <span class="value">${r.interessiert ? 'Ja · ' + formatDate(r.interessiert_at) : 'Nein'}</span>
          </div>
          <div class="detail-row">
            <span class="label">Anrufwunsch</span>
            <span class="value">${r.anrufwunsch ? escapeHtml(r.anrufwunsch) + ' · ' + formatDate(r.anrufwunsch_at) : '–'}</span>
          </div>
          ${r.empfehler_nachricht ? `<div class="detail-row" style="flex-direction:column;align-items:flex-start;gap:6px;">
            <span class="label">Persönliche Nachricht des Empfehlers</span>
            <span class="value" style="text-align:left;max-width:100%;font-style:italic;">„${escapeHtml(r.empfehler_nachricht)}"</span>
          </div>` : ''}
          <div class="detail-row">
            <span class="label">Ausgetragen</span>
            <span class="value">${r.ausgetragen ? 'Ja · ' + formatDate(r.ausgetragen_at) : 'Nein'}</span>
          </div>
        </div>

        <div class="detail-field">
          <label for="statusSel">Status ändern</label>
          <select id="statusSel">
            <option value="offen">${statusLabel('offen')}</option>
            <option value="anrufwunsch">${statusLabel('anrufwunsch')}</option>
            <option value="kontaktiert">${statusLabel('kontaktiert')}</option>
            <option value="kunde">${statusLabel('kunde')}</option>
            <option value="kein_interesse">${statusLabel('kein_interesse')}</option>
          </select>
        </div>

        <div class="detail-field">
          <label for="notizArea">Notiz</label>
          <textarea id="notizArea" placeholder="Gesprächsnotiz, Kontext, Folgetermin…"></textarea>
        </div>

        <div class="detail-actions">
          <button class="btn btn-primary" id="saveBtn">Speichern</button>
          <a class="btn btn-whatsapp" id="waBtn" target="_blank" rel="noopener">
            Per WhatsApp anschreiben
          </a>
          ${empfehlerLink ? `<button class="btn btn-secondary" id="copyBtn">Empfänger-Link kopieren</button>` : ''}
        </div>
      `;

      document.getElementById('statusSel').value = r.status || 'offen';
      document.getElementById('notizArea').value = r.notiz || '';
      document.getElementById('waBtn').href = whatsappLink(r.empfaenger_telefon);

      document.getElementById('saveBtn').addEventListener('click', async () => {
        const status = document.getElementById('statusSel').value;
        const notiz = document.getElementById('notizArea').value;
        const { error } = await updateStatus(id, status, notiz);
        if (error) {
          toast('Speichern fehlgeschlagen: ' + (error.message || ''), 3500);
          return;
        }
        toast('Gespeichert.');
        // Status-Badge oben live updaten
        const row = document.querySelector('.detail-row .value');
        if (row) row.innerHTML = getStatusBadge(status);
      });

      const copyBtn = document.getElementById('copyBtn');
      if (copyBtn) {
        copyBtn.addEventListener('click', async () => {
          try {
            await navigator.clipboard.writeText(empfehlerLink);
            toast('Link kopiert.');
          } catch (e) {
            toast('Kopieren fehlgeschlagen.', 3000);
          }
        });
      }
    })();

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);
    }
  </script>
</body>
</html>
