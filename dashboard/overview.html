<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f5f7" />
  <title>Übersicht · Empfehlungsportal</title>
  <link rel="stylesheet" href="../css/style.css?v=32" />
  <link rel="stylesheet" href="../css/dashboard.css?v=37" />
  <script src="../js/config.js"></script>
</head>
<body class="has-app-nav">

  <div id="appNav"></div>

  <div class="app-shell">
    <header class="app-header">
      <div class="app-header-left">
        <img class="app-header-photo" id="hdrPhoto" src="" alt="" />
        <div>
          <div class="app-header-name" id="hdrName">…</div>
          <div class="app-header-sub">Empfehlungsportal</div>
        </div>
      </div>
      <div class="app-header-right">
        <a href="../hub.html" class="btn-hub-back" title="Zum Hub">← <span class="lbl">Hub</span></a>
        <button class="btn-logout" id="logoutBtn">Abmelden</button>
      </div>
    </header>

    <main class="app-content">
      <div class="kpi-grid" id="kpiGrid">
        <div class="kpi-card"><div class="kpi-label">Aktive Empfehler</div><div class="kpi-value" id="kpiEmpfehler">–</div></div>
        <div class="kpi-card"><div class="kpi-label">Link-Klicks</div><div class="kpi-value" id="kpiKlicks">–</div></div>
        <div class="kpi-card"><div class="kpi-label">Empfehlungen</div><div class="kpi-value" id="kpiGesamt">–</div></div>
        <div class="kpi-card"><div class="kpi-label">Kunden</div><div class="kpi-value gold" id="kpiKunden">–</div></div>
      </div>

      <div>
        <div class="section-title">Funnel</div>
        <div class="funnel-card" id="funnelCard">
          <div class="skel-funnel-row"><span class="skel skel-line w40"></span><span class="skel skel-track"></span><span class="skel skel-line"></span></div>
          <div class="skel-funnel-row"><span class="skel skel-line w40"></span><span class="skel skel-track"></span><span class="skel skel-line"></span></div>
          <div class="skel-funnel-row"><span class="skel skel-line w40"></span><span class="skel skel-track"></span><span class="skel skel-line"></span></div>
          <div class="skel-funnel-row"><span class="skel skel-line w40"></span><span class="skel skel-track"></span><span class="skel skel-line"></span></div>
        </div>
      </div>

      <div>
        <div class="section-title">Letzte 7 Tage</div>
        <div class="chart-card">
          <div class="chart-bars" id="chartBars"></div>
          <div class="chart-labels" id="chartLabels"></div>
        </div>
      </div>

      <div>
        <div style="display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: -4px;">
          <div class="section-title" style="margin: 0 0 0 4px;">Aktivität</div>
          <a href="neu.html" class="btn-logout" style="text-decoration: none; padding: 6px 12px;">+ Neu</a>
        </div>
        <div id="feed">
          <div class="skel-row"><div class="skel-body"><span class="skel skel-line"></span><span class="skel skel-line"></span></div><span class="skel skel-tail"></span></div>
          <div class="skel-row"><div class="skel-body"><span class="skel skel-line"></span><span class="skel skel-line"></span></div><span class="skel skel-tail"></span></div>
          <div class="skel-row"><div class="skel-body"><span class="skel skel-line"></span><span class="skel skel-line"></span></div><span class="skel skel-tail"></span></div>
        </div>
      </div>
    </main>

  </div>

  <script type="module" src="../js/nav.js?v=36"></script>
  <script type="module">
    import {
      requireAuth, logout, loadKPIs, loadRecent, loadLast7Days, loadFunnel,
      loadAktiveEmpfehlerCount,
      formatDate, getStatusBadge,
    } from '../js/dashboard.js';

    document.getElementById('hdrPhoto').src = window.ENV_BERATER_FOTO || '';
    document.getElementById('hdrName').textContent = window.ENV_BERATER_NAME || 'Berater';
    document.getElementById('logoutBtn').addEventListener('click', logout);

    (async () => {
      const session = await requireAuth();
      if (!session) return;

      // KPIs
      const [kpis, empfCount] = await Promise.all([loadKPIs(), loadAktiveEmpfehlerCount()]);
      document.getElementById('kpiEmpfehler').textContent = empfCount;
      document.getElementById('kpiKlicks').textContent    = kpis.klicks;
      document.getElementById('kpiGesamt').textContent    = kpis.gesamt;
      document.getElementById('kpiKunden').textContent    = kpis.kunden;

      // Funnel
      const f = await loadFunnel();
      const stages = [
        { key: 'gesendet',     label: 'Gesendet',     count: f.gesendet,     base: f.gesendet,    gold: false },
        { key: 'geoeffnet',    label: 'Geöffnet',     count: f.geoeffnet,    base: f.gesendet,    gold: false },
        { key: 'interessiert', label: 'Interesse',    count: f.interessiert, base: f.geoeffnet,   gold: false },
        { key: 'kunden',       label: 'Kunde',        count: f.kunden,       base: f.interessiert, gold: true  },
      ];
      const funnelMax = Math.max(1, f.gesendet);
      document.getElementById('funnelCard').innerHTML = stages.map(s => {
        const widthPct = (s.count / funnelMax) * 100;
        const pct = s.base > 0 ? Math.round((s.count / s.base) * 100) + ' %' : '–';
        return `
          <div class="funnel-row">
            <div class="label">${s.label}</div>
            <div class="bar-wrap"><div class="bar ${s.gold?'gold':''}" style="width: ${widthPct}%"></div></div>
            <div class="value">${s.count}</div>
            <div class="pct">${s.key === 'gesendet' ? '' : pct}</div>
          </div>`;
      }).join('');

      // 7-Tage-Chart
      const days = await loadLast7Days();
      const max = Math.max(1, ...days.map(d => d.count));
      const bars = document.getElementById('chartBars');
      const labels = document.getElementById('chartLabels');
      bars.innerHTML = '';
      labels.innerHTML = '';
      const weekday = ['So','Mo','Di','Mi','Do','Fr','Sa'];
      days.forEach(d => {
        const col = document.createElement('div');
        col.className = 'chart-col';
        const pct = d.count === 0 ? 4 : Math.max(8, (d.count / max) * 100);
        col.innerHTML = `<div class="chart-bar ${d.count===0?'zero':''}" style="height:${pct}%">${d.count>0?`<span class="chart-val">${d.count}</span>`:''}</div>`;
        bars.appendChild(col);

        const lbl = document.createElement('span');
        lbl.textContent = weekday[d.date.getDay()];
        labels.appendChild(lbl);
      });

      // Feed
      const feed = document.getElementById('feed');
      const recent = await loadRecent(10);
      if (!recent.length) {
        feed.innerHTML = '<div class="empty-state">Noch keine Empfehlungen.</div>';
      } else {
        feed.innerHTML = '<div class="feed">' + recent.map(r => `
          <a class="feed-row" href="detail.html?id=${r.id}">
            <div class="feed-main">
              <div class="feed-name">${escapeHtml(r.empfaenger_name || '–')}</div>
              <div class="feed-meta">
                ${getStatusBadge(r.status)}
                <span>${r.typ === 'info' ? 'Info' : 'Direkt'}</span>
                <span>${formatDate(r.created_at)}</span>
              </div>
            </div>
            <span class="feed-arrow">›</span>
          </a>`).join('') + '</div>';
      }
    })();

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);
    }
  </script>
</body>
</html>
