<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f5f7" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Promoter · Empfehlungsportal</title>
  <link rel="stylesheet" href="../css/style.css?v=32" />
  <link rel="stylesheet" href="../css/dashboard.css?v=43" />
  <script src="../js/config.js"></script>
  <style>
    .pd-card { background:#fff; border:1px solid var(--hairline,#E8E5E0); border-radius:14px; padding:20px 22px; margin-bottom:16px; }
    .pd-card h3 { margin:0 0 14px; font-size:16px; }
    .pd-field { margin-bottom:12px; }
    .pd-field label { display:block; font-size:12px; font-weight:600; color:var(--ink-muted,#6E6660); margin-bottom:5px; }
    .pd-field input, .pd-field textarea { width:100%; border:1px solid var(--hairline,#E8E5E0); border-radius:9px; padding:9px 12px; font:inherit; font-size:14px; background:#fff; color:var(--ink,#1A1A1A); }
    .pd-field textarea { resize:vertical; min-height:56px; }
    .pd-row-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media (max-width:560px){ .pd-row-2 { grid-template-columns:1fr; } }
    .pd-stats { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; }
    .pd-stat { flex:1 1 100px; background:#fff; border:1px solid var(--hairline,#E8E5E0); border-radius:12px; padding:12px 14px; text-align:center; }
    .pd-stat-num { font-size:22px; font-weight:800; color:#1A1A1A; }
    .pd-stat-lbl { font-size:12px; color:var(--ink-muted,#6E6660); }
    .pd-actions { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px; }
    .pd-btn { text-decoration:none; padding:9px 16px; border-radius:999px; border:1px solid var(--hairline,#E8E5E0); background:#fff; color:#1A1A1A; font-weight:600; font-size:13.5px; cursor:pointer; }
    .pd-btn.primary { background:#141414; color:#fff; border-color:#141414; }
    .pd-link-track { display:flex; align-items:center; flex-wrap:wrap; gap:10px; margin-top:6px; }
    .pd-link-status { font-size:12.5px; color:var(--ink-soft,#8A8178); }
    .pd-link-status.is-open { color:#1F6B30; font-weight:600; }
    .pd-copy { border:1px solid var(--hairline,#E8E5E0); background:transparent; border-radius:999px; padding:4px 11px; font-size:12px; font-weight:600; cursor:pointer; }
    .pd-badge { display:inline-block; font-size:11px; font-weight:700; padding:3px 10px; border-radius:999px; margin-left:auto; }
  </style>
</head>
<body class="has-app-nav">

  <div id="appNav"></div>

  <div class="app-shell">
    <header class="app-header">
      <div class="app-header-left">
        <img class="app-header-photo" id="hdrPhoto" src="" alt="" />
        <div>
          <div class="app-header-name" id="hdrName">…</div>
          <div class="app-header-sub">Promoter-Detail</div>
        </div>
      </div>
      <div class="app-header-right">
        <a href="empfehler.html" class="btn-hub-back" title="Zu Champions">← <span class="lbl">Champions</span></a>
        <button class="btn-logout" id="logoutBtn">Abmelden</button>
      </div>
    </header>

    <main class="app-content">
      <div id="pdBody">
        <div style="padding:24px;text-align:center;color:var(--ink-muted,#6E6660);">Lade Promoter…</div>
      </div>
    </main>

    <script type="module" src="../js/nav.js?v=48"></script>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script type="module" src="../js/promoter-detail.js?v=1"></script>
</body>
</html>
