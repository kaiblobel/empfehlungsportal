<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f5f7" />
  <title>Empfehlungen · Empfehlungsportal</title>
  <link rel="stylesheet" href="../css/style.css?v=32" />
  <link rel="stylesheet" href="../css/dashboard.css?v=43" />
  <script src="../js/config.js"></script>
</head>
<body class="has-app-nav">

  <div id="appNav"></div>

  <div class="app-shell">
    <header class="app-header">
      <div class="app-header-left">
        <img class="app-header-photo" id="hdrPhoto" src="" alt="" />
        <div>
          <div class="app-header-name" id="hdrName">…</div>
          <div class="app-header-sub">Empfehlungen</div>
        </div>
      </div>
      <div class="app-header-right">
        <a href="../hub.html" class="btn-hub-back" title="Zum Hub">← <span class="lbl">Hub</span></a>
        <button class="btn-logout" id="logoutBtn">Abmelden</button>
      </div>
    </header>

    <main class="app-content">
      <div style="display: flex; justify-content: flex-end; margin-bottom: -8px;">
        <a href="neu.html" class="btn-logout" style="text-decoration: none; padding: 8px 14px;">+ Neue Empfehlung</a>
      </div>
      <div class="search-bar">
        <input id="searchInput" type="search" placeholder="Nach Name suchen…" autocomplete="off" />
      </div>

      <div class="filter-tabs" id="filterTabs">
        <button class="filter-tab active" data-filter="alle">Alle</button>
        <button class="filter-tab" data-filter="offen">Offen</button>
        <button class="filter-tab" data-filter="anrufwunsch">Anrufwunsch</button>
        <button class="filter-tab" data-filter="kontaktiert">Kontaktiert</button>
        <button class="filter-tab" data-filter="kunde">Kunde</button>
        <button class="filter-tab" data-filter="kein_interesse">Kein Interesse</button>
      </div>

      <div id="list">
        <div class="skel-row"><div class="skel-body"><span class="skel skel-line"></span><span class="skel skel-line"></span></div><span class="skel skel-tail"></span></div>
        <div class="skel-row"><div class="skel-body"><span class="skel skel-line"></span><span class="skel skel-line"></span></div><span class="skel skel-tail"></span></div>
        <div class="skel-row"><div class="skel-body"><span class="skel skel-line"></span><span class="skel skel-line"></span></div><span class="skel skel-tail"></span></div>
      </div>
    </main>

    <script type="module" src="../js/nav.js?v=46"></script>
  </div>

  <!-- Schnell-Menü (Rechtsklick auf eine Empfehlung) -->
  <div id="ctxMenu" class="ctx-menu" role="menu" hidden>
    <div class="ctx-head" id="ctxHead">Empfehlung</div>
    <button class="ctx-item ctx-kunde" role="menuitem" data-act="status" data-val="kunde">
      <span class="ctx-dot dot-kunde"></span>Als Kunde gewonnen
    </button>
    <button class="ctx-item" role="menuitem" data-act="interessiert">
      <span class="ctx-dot dot-interessiert"></span>Interessent
    </button>
    <button class="ctx-item" role="menuitem" data-act="status" data-val="anrufwunsch">
      <span class="ctx-dot dot-anrufwunsch"></span>Anrufwunsch
    </button>
    <button class="ctx-item" role="menuitem" data-act="status" data-val="kontaktiert">
      <span class="ctx-dot dot-kontaktiert"></span>Kontaktiert
    </button>
    <button class="ctx-item" role="menuitem" data-act="status" data-val="kein_interesse">
      <span class="ctx-dot dot-kein_interesse"></span>Kein Interesse
    </button>
    <button class="ctx-item" role="menuitem" data-act="status" data-val="offen">
      <span class="ctx-dot dot-offen"></span>Zurück auf offen
    </button>
    <div class="ctx-sep"></div>
    <button class="ctx-item" role="menuitem" data-act="edit">Bearbeiten…</button>
    <button class="ctx-item" role="menuitem" data-act="new">Neue Empfehlung…</button>
    <button class="ctx-item ctx-danger" role="menuitem" data-act="delete">Löschen…</button>
    <div class="ctx-sep"></div>
    <button class="ctx-item ctx-open" role="menuitem" data-act="open">Details öffnen &rsaquo;</button>
  </div>
  <div id="toast" class="toast" hidden></div>

  <!-- Inline-Bearbeiten-Overlay (Rechtsklick > Bearbeiten) -->
  <div id="editModal" class="edit-modal" hidden>
    <div class="edit-modal-backdrop" id="editModalBd"></div>
    <div class="edit-modal-card" role="dialog" aria-modal="true" aria-labelledby="editModalTitle">
      <h3 class="edit-modal-title" id="editModalTitle">Empfehlung bearbeiten</h3>
      <div class="edit-field">
        <label for="editName">Name</label>
        <input id="editName" type="text" autocomplete="off" />
      </div>
      <div class="edit-field">
        <label for="editTel">Telefon</label>
        <input id="editTel" type="tel" autocomplete="off" />
      </div>
      <div class="edit-field">
        <label for="editThema">Thema</label>
        <select id="editThema"><option value="">— kein Thema —</option></select>
      </div>
      <div class="edit-field">
        <label for="editNotiz">Notiz</label>
        <textarea id="editNotiz" rows="2"></textarea>
      </div>
      <div class="edit-actions">
        <button class="edit-btn" id="editCancel" type="button">Abbrechen</button>
        <button class="edit-btn primary" id="editSave" type="button">Speichern</button>
      </div>
    </div>
  </div>

  <script type="module">
    import {
      requireAuth, logout, loadEmpfehlungen, updateStatus, setInteressiert,
      updateEmpfehlung, formatDate, getStatusBadge, applyBeraterHeader,
    } from '../js/dashboard.js';
    import { deleteEmpfehlung, getVorlagen } from '../js/supabase.js';

    applyBeraterHeader();
    document.getElementById('logoutBtn').addEventListener('click', logout);

    // URL-Param `?status=anrufwunsch` als Initial-Filter lesen
    const urlParams = new URLSearchParams(window.location.search);
    const allowed = new Set(['alle','offen','anrufwunsch','kontaktiert','kunde','kein_interesse']);
    const initParam = urlParams.get('status');
    let currentFilter = initParam && allowed.has(initParam) ? initParam : 'alle';
    if (initParam === 'interessiert') currentFilter = 'offen'; // Map "Interesse" auf status=offen mit interessiert=true; siehe loadEmpfehlungen
    let currentSearch = '';
    let allItems = [];

    // Initial-Tab aktivieren
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.toggle('active', b.dataset.filter === currentFilter));

    (async () => {
      const session = await requireAuth();
      if (!session) return;
      await refresh();
    })();

    document.getElementById('filterTabs').addEventListener('click', (e) => {
      const btn = e.target.closest('.filter-tab');
      if (!btn) return;
      document.querySelectorAll('.filter-tab').forEach(b => b.classList.toggle('active', b === btn));
      currentFilter = btn.dataset.filter;
      refresh();
    });

    let searchTimer;
    document.getElementById('searchInput').addEventListener('input', (e) => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        currentSearch = e.target.value;
        refresh();
      }, 200);
    });

    async function refresh() {
      const list = document.getElementById('list');
      list.innerHTML = '<div class="skel-row"><div class="skel-body"><span class="skel skel-line"></span><span class="skel skel-line"></span></div><span class="skel skel-tail"></span></div><div class="skel-row"><div class="skel-body"><span class="skel skel-line"></span><span class="skel skel-line"></span></div><span class="skel skel-tail"></span></div>';
      allItems = await loadEmpfehlungen({ filter: currentFilter, search: currentSearch });
      render();
    }

    function render() {
      const list = document.getElementById('list');
      if (!allItems.length) {
        list.innerHTML = '<div class="empty-state">Keine Empfehlungen für diesen Filter.</div>';
        return;
      }
      list.innerHTML = '<div class="feed">' + allItems.map(r => `
        <a class="feed-row" href="detail.html?id=${r.id}" data-id="${r.id}" data-status="${r.status || 'offen'}">
          <div class="feed-main">
            <div class="feed-name">${escapeHtml(r.empfaenger_name || '–')}</div>
            <div class="feed-meta">
              ${getStatusBadge(r.status)}
              <span>${escapeHtml(r.empfaenger_telefon || '–')}</span>
              <span>${r.typ === 'info' ? 'Info' : 'Direkt'}</span>
              <span>${formatDate(r.created_at)}</span>
              <span>${r.link_geoeffnet ? '👁 geöffnet' : '⚪ ungeöffnet'}</span>
            </div>
          </div>
          <span class="feed-arrow">›</span>
        </a>`).join('') + '</div>';
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);
    }

    /* ---------- Schnell-Menü (Rechtsklick auf eine Empfehlung) ---------- */
    const ctxMenu = document.getElementById('ctxMenu');
    const ctxHead = document.getElementById('ctxHead');
    const toastEl = document.getElementById('toast');
    let ctxTarget = null; // { id, href, status }
    let toastTimer;

    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.hidden = false;
      requestAnimationFrame(() => toastEl.classList.add('show'));
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toastEl.classList.remove('show');
        setTimeout(() => { toastEl.hidden = true; }, 250);
      }, 2200);
    }

    function hideCtx() {
      ctxMenu.hidden = true;
      ctxTarget = null;
      // aktive Markierung auf der Zeile entfernen
      document.querySelectorAll('.feed-row.ctx-active').forEach(el => el.classList.remove('ctx-active'));
    }

    function openCtx(x, y, row) {
      const item = allItems.find(r => String(r.id) === String(row.dataset.id));
      ctxTarget = { id: row.dataset.id, href: row.getAttribute('href'), status: row.dataset.status };
      ctxHead.textContent = (item && item.empfaenger_name) ? item.empfaenger_name : 'Empfehlung';
      // Aktuellen Status im Menü markieren
      ctxMenu.querySelectorAll('.ctx-item').forEach(b => {
        b.classList.toggle('is-current', b.dataset.act === 'status' && b.dataset.val === ctxTarget.status);
      });
      row.classList.add('ctx-active');
      // Erst sichtbar machen (für Maße), dann positionieren + an Viewport klemmen
      ctxMenu.hidden = false;
      const mw = ctxMenu.offsetWidth, mh = ctxMenu.offsetHeight;
      const px = Math.min(x, window.innerWidth - mw - 8);
      const py = Math.min(y, window.innerHeight - mh - 8);
      ctxMenu.style.left = Math.max(8, px) + 'px';
      ctxMenu.style.top = Math.max(8, py) + 'px';
    }

    document.getElementById('list').addEventListener('contextmenu', (e) => {
      const row = e.target.closest('.feed-row');
      if (!row) return;
      e.preventDefault();
      openCtx(e.clientX, e.clientY, row);
    });

    ctxMenu.addEventListener('click', async (e) => {
      const btn = e.target.closest('.ctx-item');
      if (!btn || !ctxTarget) return;
      const { id, href, status } = ctxTarget;
      const act = btn.dataset.act;

      if (act === 'open') { window.location.href = href; return; }
      if (act === 'new') { window.location.href = 'neu.html'; return; }
      if (act === 'edit') { openEditOverlay(id); hideCtx(); return; }

      if (act === 'delete') {
        const item = allItems.find(r => String(r.id) === String(id));
        const nm = (item && item.empfaenger_name) ? item.empfaenger_name : 'diese Empfehlung';
        hideCtx();
        if (!confirm(`Empfehlung von ${nm} wirklich löschen? Das lässt sich nicht rückgängig machen.`)) return;
        try {
          const { error } = await deleteEmpfehlung(id);
          if (error) throw error;
          showToast('Empfehlung gelöscht');
          await refresh();
        } catch (err) {
          console.warn('[ctx] delete fehlgeschlagen', err);
          showToast('Fehler beim Löschen');
        }
        return;
      }

      hideCtx();

      try {
        if (act === 'interessiert') {
          const { error } = await setInteressiert(id, true);
          if (error) throw error;
          showToast('Als Interessent markiert');
        } else if (act === 'status') {
          const val = btn.dataset.val;
          if (val === status) { showToast('Status unverändert'); return; }
          const { error } = await updateStatus(id, val);
          if (error) throw error;
          const labels = { kunde: 'Als Kunde gewonnen \u{1F389}', anrufwunsch: 'Anrufwunsch gesetzt', kontaktiert: 'Als kontaktiert markiert', kein_interesse: 'Als „kein Interesse" markiert', offen: 'Zurück auf offen' };
          showToast(labels[val] || 'Status aktualisiert');
        }
        await refresh();
      } catch (err) {
        console.warn('[ctx] update fehlgeschlagen', err);
        showToast('Fehler beim Speichern');
      }
    });

    /* ---------- Inline-Bearbeiten-Overlay ---------- */
    const editModal = document.getElementById('editModal');
    const editName = document.getElementById('editName');
    const editTel = document.getElementById('editTel');
    const editThema = document.getElementById('editThema');
    const editNotiz = document.getElementById('editNotiz');
    const editSave = document.getElementById('editSave');
    let editId = null;
    let vorlagenLoaded = false;

    async function ensureVorlagen() {
      if (vorlagenLoaded) return;
      vorlagenLoaded = true;
      const vorlagen = await getVorlagen(window.ENV_BERATER_ID || null);
      for (const v of vorlagen) {
        const opt = document.createElement('option');
        opt.value = v.slug;
        opt.textContent = v.titel || v.slug;
        editThema.appendChild(opt);
      }
    }

    async function openEditOverlay(id) {
      const item = allItems.find(r => String(r.id) === String(id));
      if (!item) return;
      editId = id;
      await ensureVorlagen();
      editName.value = item.empfaenger_name || '';
      editTel.value = item.empfaenger_telefon || '';
      editThema.value = item.vorlage_slug || '';
      editNotiz.value = item.notiz || '';
      editModal.hidden = false;
      requestAnimationFrame(() => editModal.classList.add('open'));
      setTimeout(() => editName.focus(), 60);
    }

    function closeEditOverlay() {
      editModal.classList.remove('open');
      setTimeout(() => { editModal.hidden = true; }, 220);
      editId = null;
    }

    editSave.addEventListener('click', async () => {
      if (!editId) return;
      const fields = {
        empfaenger_name: editName.value.trim(),
        empfaenger_telefon: editTel.value.trim() || null,
        vorlage_slug: editThema.value || null,
        notiz: editNotiz.value.trim() || null,
      };
      editSave.disabled = true;
      editSave.textContent = 'Speichere…';
      try {
        const { error } = await updateEmpfehlung(editId, fields);
        if (error) throw error;
        closeEditOverlay();
        showToast('Änderungen gespeichert');
        await refresh();
      } catch (err) {
        console.warn('[edit] update fehlgeschlagen', err);
        showToast('Fehler beim Speichern');
      } finally {
        editSave.disabled = false;
        editSave.textContent = 'Speichern';
      }
    });

    document.getElementById('editCancel').addEventListener('click', closeEditOverlay);
    document.getElementById('editModalBd').addEventListener('click', closeEditOverlay);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && !editModal.hidden) closeEditOverlay();
    });

    // Schließen bei Klick außerhalb, Scroll, Escape, erneutem Rechtsklick außerhalb
    document.addEventListener('click', (e) => {
      if (!ctxMenu.hidden && !ctxMenu.contains(e.target)) hideCtx();
    });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') hideCtx(); });
    window.addEventListener('scroll', () => { if (!ctxMenu.hidden) hideCtx(); }, true);
    window.addEventListener('resize', hideCtx);
  </script>
</body>
</html>
