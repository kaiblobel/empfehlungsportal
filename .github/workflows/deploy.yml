name: Deploy to All-Inkl (FTP)

# Push auf main/master triggert FTP-Upload zu All-Inkl.
# Voraussetzung: FTP_SERVER, FTP_USERNAME, FTP_PASSWORD als Repo-Secrets gesetzt.
# Optional: Repo-Variable FTP_SERVER_DIR überschreibt den Server-Pfad.
on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ftp-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./
          server-dir: ${{ vars.FTP_SERVER_DIR || '/empfehlung.kaiblobel.de/' }}
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.claude/**
            **/.agents/**
            **/node_modules/**
            README.md
            CLAUDE.md
            .gitignore
