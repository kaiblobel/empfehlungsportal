  <meta charset="UTF-8" />

  <title>Prämien · Empfehlungs-HUB</title>

  <link rel="stylesheet" href="css/style.css?v=32" />
  <link rel="stylesheet" href="css/dashboard.css?v=43" />
  <link rel="stylesheet" href="css/hub.css?v=42" />

  <style>
    .pr-toolbar { display:flex; flex-wrap:wrap; gap:12px; align-items:center; margin: 8px 0 18px; }
    .pr-sync { background:#141414; color:#fff; border:0; border-radius:999px; padding:11px 22px; font-weight:600; font-size:14px; cursor:pointer; }
    .pr-sync:disabled { opacity:.6; cursor:default; }
    .pr-filters { display:flex; gap:8px; }
    .pr-chip { border:1px solid var(--border,#e3ddd4); background:#fff; border-radius:999px; padding:8px 16px; font-size:13px; font-weight:500; cursor:pointer; color:var(--text-secondary,#6B6660); }
    .pr-chip.active { background:rgba(201,185,138,.14); border-color:rgba(201,185,138,.5); color:#1A1A1A; }
    .pr-count { font-size:13px; color:var(--text-secondary,#6B6660); margin-left:auto; }

    .pr-list { display:flex; flex-direction:column; gap:10px; }
    .pr-card { display:grid; grid-template-columns: 1fr auto; gap:14px; align-items:center;
      background:#fff; border:1px solid var(--border,#e3ddd4); border-radius:14px; padding:16px 18px; }
    .pr-card.is-offen { border-left:3px solid #C28447; }
    .pr-card.is-ausgezahlt { opacity:.72; }
    .pr-main { min-width:0; }
    .pr-row1 { display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; }
    .pr-name { font-weight:700; font-size:15px; color:#1A1A1A; }
    .pr-stufe { font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:#8B7355; }
    .pr-titel { font-size:14px; color:#1A1A1A; margin-top:3px; }
    .pr-row1 .pr-status { margin-left:auto; }
    .pr-headline { display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; margin-top:8px; }
    .pr-value-big { font-size:27px; font-weight:800; line-height:1; letter-spacing:-0.02em;
      background:linear-gradient(135deg,#C49A4A 0%,#8B6B2E 100%);
      -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:#8B6B2E; }
    .pr-headline .pr-titel { margin-top:0; color:var(--text-secondary,#6B6660); }
    .pr-bezug { display:flex; align-items:center; gap:6px; font-size:12.5px; color:var(--text-secondary,#6B6660); margin-top:6px; }
    .pr-bezug strong { color:#1A1A1A; font-weight:600; }
    .pr-bezug svg { color:#2E9E4B; flex:0 0 auto; }
    .pr-card.is-offen .pr-bezug svg { color:#C49A4A; }
    .pr-meta { font-size:12.5px; color:var(--text-secondary,#6B6660); margin-top:6px; }
    .pr-meta .pr-wert { font-weight:600; color:#1A1A1A; }
    .pr-status { display:inline-block; font-size:11px; font-weight:700; padding:3px 10px; border-radius:999px; }
    .pr-status.offen { background:rgba(194,132,71,.14); color:#9A5A22; }
    .pr-status.ausgezahlt { background:rgba(122,139,111,.16); color:#4F6045; }
    .pr-status.verzichtet { background:rgba(107,102,96,.12); color:#6B6660; }
    .pr-actions { display:flex; flex-direction:column; gap:6px; align-items:flex-end; }
    .pr-btn { border:1px solid var(--border,#e3ddd4); background:#fff; border-radius:8px; padding:7px 12px; font-size:12.5px; font-weight:600; cursor:pointer; white-space:nowrap; }
    .pr-btn.primary { background:#141414; color:#fff; border-color:#141414; }
    .pr-detail { grid-column:1 / -1; display:none; gap:10px; margin-top:6px; padding-top:12px; border-top:1px solid var(--border,#eee); }
    .pr-card.open .pr-detail { display:grid; grid-template-columns:1fr 1fr; }
    .pr-detail label { display:block; font-size:12px; color:var(--text-secondary,#6B6660); margin-bottom:4px; }
    .pr-detail input { width:100%; padding:8px 10px; border:1px solid var(--border,#e3ddd4); border-radius:8px; font-size:13px; }
    .pr-empty { padding:28px; text-align:center; color:var(--text-secondary,#6B6660); font-size:14px; }
    @media (max-width:560px){ .pr-card { grid-template-columns:1fr; } .pr-actions { flex-direction:row; align-items:stretch; } .pr-card.open .pr-detail { grid-template-columns:1fr; } }

    .pr-belegnr { font-size:11.5px; color:var(--text-secondary,#6B6660); }
    .pr-modal { position:fixed; inset:0; z-index:200; display:none; }
    .pr-modal.open { display:block; }
    .pr-modal-bd { position:absolute; inset:0; background:rgba(20,18,12,.45); }
    .pr-modal-card { position:relative; max-width:440px; margin:6vh auto 0; background:#fff; border-radius:16px; padding:24px 24px 20px; box-shadow:0 30px 80px rgba(0,0,0,.25); max-height:88vh; overflow:auto; }
    .pr-modal-card h3 { font-size:18px; margin:0 0 4px; }
    .pr-modal-sub { font-size:13px; color:var(--text-secondary,#6B6660); margin-bottom:16px; }
    .pr-field { margin-bottom:12px; }
    .pr-field label { display:block; font-size:12px; color:var(--text-secondary,#6B6660); margin-bottom:5px; }
    .pr-field input, .pr-field select, .pr-field textarea { width:100%; padding:9px 11px; border:1px solid var(--border,#e3ddd4); border-radius:8px; font-size:14px; font-family:inherit; background:#fff; }
    .pr-field textarea { resize:vertical; min-height:54px; }
    .pr-modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:18px; }
    .pr-modal-close { position:absolute; top:12px; right:14px; border:0; background:transparent; font-size:24px; line-height:1; cursor:pointer; color:#6B6660; }
  </style>
</head>
<body data-page="praemien-admin" class="has-app-nav">

  <div id="appNav"></div>
  <script type="module" src="js/nav.js?v=45"></script>

  <header class="h-header">
    <div class="h-header-left">
      <img class="h-header-photo" id="hPhoto" src="" alt="" />
      <div class="h-header-text">
        <div class="h-header-name" id="hName">…</div>
        <div class="h-header-sub">Prämien verwalten</div>
      </div>
    </div>
    <button class="h-logout" id="logoutBtn">Abmelden</button>
  </header>

  <main class="h-main">
    <section class="cms-intro">
      <h2>Verdiente Prämien</h2>
      <p>
        Hier siehst du, welcher Empfehler welche Belohnungsstufe erreicht hat (Stufe = Anzahl gewonnener Kunden). Markiere ausgezahlte Prämien und halte die gewählte Variante fest.
      </p>
      <p style="margin-top:10px;font-size:13px;">
        <a href="hub.html" style="color:var(--accent-gold);font-weight:600;text-decoration:none;">← Zurück zum Hub</a>
      </p>
    </section>

    <section class="pr-toolbar">
      <button class="pr-sync" id="prSync" type="button">Prämien aktualisieren</button>
      <div class="pr-filters" id="prFilters">
        <button class="pr-chip active" data-filter="offen" type="button">Offen</button>
        <button class="pr-chip" data-filter="alle" type="button">Alle</button>
        <button class="pr-chip" data-filter="ausgezahlt" type="button">Ausgezahlt</button>
      </div>
      <span class="pr-count" id="prCount"></span>
    </section>

    <section class="pr-list" id="prList">
      <div class="pr-empty">Lade Prämien…</div>
    </section>
  </main>

  <!-- Schnell-Menü (Rechtsklick auf eine Prämie) -->
  <div id="prCtxMenu" class="ctx-menu" role="menu" hidden>
    <div class="ctx-head" id="prCtxHead">Prämie</div>
    <button class="ctx-item ctx-kunde" role="menuitem" data-act="pay">Auszahlen…</button>
    <button class="ctx-item" role="menuitem" data-act="variante">Variante / Notiz bearbeiten</button>
    <button class="ctx-item" role="menuitem" data-act="skip">Als „verzichtet" markieren</button>
    <button class="ctx-item" role="menuitem" data-act="beleg">Beleg öffnen</button>
    <button class="ctx-item" role="menuitem" data-act="reopen">Auf „offen" zurücksetzen</button>
    <div class="ctx-sep"></div>
    <button class="ctx-item ctx-danger" role="menuitem" data-act="delete">Löschen…</button>
  </div>

  <!-- Auszahl-Dialog -->
  <div class="pr-modal" id="prModal" role="dialog" aria-modal="true" aria-labelledby="prModalTitle">
    <div class="pr-modal-bd" id="prModalBd"></div>
    <div class="pr-modal-card">
      <button class="pr-modal-close" id="prModalClose" type="button" aria-label="Schließen">×</button>
      <h3 id="prModalTitle">Prämie auszahlen</h3>
      <p class="pr-modal-sub" id="prModalSub">–</p>
      <div class="pr-field"><label>Betrag / Warenwert (€)</label><input id="prfBetrag" type="number" step="0.01" inputmode="decimal" /></div>
      <div class="pr-field"><label>Auszahlungsart</label>
        <select id="prfArt">
          <option value="Überweisung">Überweisung</option>
          <option value="PayPal">PayPal</option>
          <option value="Gutschein">Gutschein</option>
          <option value="Bar">Bar</option>
          <option value="Sachleistung">Sachleistung (Ware)</option>
          <option value="Spende">Spende</option>
        </select>
      </div>
      <div class="pr-field"><label>Gewählte Variante (optional)</label><input id="prfVariante" placeholder="z. B. Apple Watch" /></div>
      <div class="pr-field"><label>Anschrift Empfänger (optional, für die Quittung)</label><textarea id="prfAdresse" placeholder="Straße Nr.&#10;PLZ Ort"></textarea></div>
      <div class="pr-field"><label>Datum</label><input id="prfDatum" type="date" /></div>
      <div class="pr-field"><label>Notiz (optional)</label><input id="prfNotiz" placeholder="optional" /></div>
      <div class="pr-modal-actions">
        <button class="pr-btn" id="prfCancel" type="button">Abbrechen</button>
        <button class="pr-btn primary" id="prfConfirm" type="button">Auszahlen &amp; Beleg erstellen</button>
      </div>
    </div>
  </div>

  <div class="h-toast" id="hToast"></div>

  <script type="module" src="js/praemien-admin.js?v=4"></script>
</body>
</html>
