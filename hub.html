<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#FAFAFA" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Empfehlungshub · Kai Blobel</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/assets/icons/icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Empfehlungs-HUB" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="stylesheet" href="css/style.css?v=26c" />
  <link rel="stylesheet" href="css/dashboard.css?v=26c" />
  <link rel="stylesheet" href="css/hub.css?v=26c" />
  <script src="js/config.js"></script>
</head>
<body data-page="hub" class="has-app-nav">

  <div id="appNav"></div>

  <header class="h-header">
    <div class="h-header-left">
      <img class="h-header-photo" id="hPhoto" src="" alt="" />
      <div class="h-header-text">
        <div class="h-header-name" id="hName">…</div>
        <div class="h-header-sub">Regionaldirektion · Hub</div>
      </div>
    </div>
    <div class="h-header-right">
      <div class="h-live"><span class="h-live-dot"></span><span>System aktiv</span></div>
      <span class="h-clock" id="hClock">--:--</span>
      <button class="h-logout" id="logoutBtn">Abmelden</button>
    </div>
  </header>

  <main class="h-main">

    <!-- Hero -->
    <section class="h-hero">
      <h1 class="h-greet" id="hGreet">…</h1>
      <p class="h-stats-text" id="hStats">Lade Live-Daten…</p>
    </section>

    <!-- Hot Leads (NEU) -->
    <section>
      <div class="h-label" id="hHotLabel">Aufmerksamkeit erforderlich</div>
      <div class="h-hotleads" id="hHotLeads" style="margin-top:12px;">
        <div class="skel-card"><span class="skel skel-line w40"></span><span class="skel skel-line"></span><span class="skel skel-line w60"></span></div>
        <div class="skel-card"><span class="skel skel-line w40"></span><span class="skel skel-line"></span><span class="skel skel-line w60"></span></div>
      </div>
    </section>

    <!-- 1 · KPI Dashboard -->
    <section>
      <div class="h-kpis">
        <div class="h-kpi"><div class="h-kpi-label">Aktive Empfehler</div><div class="h-kpi-value" id="kpiEmpfehler"><span class="h-skeleton"></span></div><span class="h-kpi-sub" id="subEmpfehler">—</span></div>
        <div class="h-kpi"><div class="h-kpi-label">Link-Klicks</div><div class="h-kpi-value" id="kpiKlicks"><span class="h-skeleton"></span></div><span class="h-kpi-sub" id="subKlicks">—</span></div>
        <div class="h-kpi"><div class="h-kpi-label">Empfehlungen</div><div class="h-kpi-value" id="kpiGesamt"><span class="h-skeleton"></span></div><span class="h-kpi-sub" id="subGesamt">—</span></div>
        <div class="h-kpi"><div class="h-kpi-label">Kunden</div><div class="h-kpi-value" id="kpiKunden"><span class="h-skeleton"></span></div><span class="h-kpi-sub" id="subKunden">—</span></div>
      </div>
    </section>

    <!-- Schnellaktion (primärer CTA) -->
    <section>
      <div class="h-label">Schnellaktion</div>
      <div class="h-quick h-quick-single" style="margin-top:12px;">
        <a class="h-action-primary" href="empfehlen.html">
          <span class="h-action-icon" data-icon="Plus" data-icon-size="22"></span>
          <span class="h-action-text">
            <span class="h-action-title">Neue Empfehlung</span>
            <span class="h-action-sub">Empfehlung anlegen und sofort teilen</span>
          </span>
          <span class="h-action-arrow" data-icon="ArrowRight" data-icon-size="18"></span>
        </a>
      </div>
    </section>

    <!-- Funnel -->
    <section>
      <div class="h-label">Funnel</div>
      <div class="h-funnel" id="hFunnel" style="margin-top:12px;">
        <div class="skel-funnel-row"><span class="skel skel-line w40"></span><span class="skel skel-track"></span><span class="skel skel-line"></span><span class="skel skel-line"></span></div>
        <div class="skel-funnel-row"><span class="skel skel-line w40"></span><span class="skel skel-track"></span><span class="skel skel-line"></span><span class="skel skel-line"></span></div>
        <div class="skel-funnel-row"><span class="skel skel-line w40"></span><span class="skel skel-track"></span><span class="skel skel-line"></span><span class="skel skel-line"></span></div>
        <div class="skel-funnel-row"><span class="skel skel-line w40"></span><span class="skel skel-track"></span><span class="skel skel-line"></span><span class="skel skel-line"></span></div>
      </div>
    </section>

    <!-- Top-Empfehler -->
    <section>
      <div class="h-label">Top-Empfehler</div>
      <div class="h-promoters" id="hPromoters" style="margin-top:12px;">
        <div class="skel-card" style="flex-direction:row;align-items:center;gap:12px;"><span class="skel skel-circle"></span><div style="flex:1;display:flex;flex-direction:column;gap:6px;"><span class="skel skel-line w60"></span><span class="skel skel-line w40" style="height:10px;"></span></div></div>
        <div class="skel-card" style="flex-direction:row;align-items:center;gap:12px;"><span class="skel skel-circle"></span><div style="flex:1;display:flex;flex-direction:column;gap:6px;"><span class="skel skel-line w60"></span><span class="skel skel-line w40" style="height:10px;"></span></div></div>
        <div class="skel-card" style="flex-direction:row;align-items:center;gap:12px;"><span class="skel skel-circle"></span><div style="flex:1;display:flex;flex-direction:column;gap:6px;"><span class="skel skel-line w60"></span><span class="skel skel-line w40" style="height:10px;"></span></div></div>
      </div>
    </section>

    <!-- Letzte Aktivität · Timeline -->
    <section>
      <div class="h-label">Letzte Aktivität</div>
      <div class="h-timeline" id="hTimeline" style="margin-top:12px;">
        <div class="skel-row"><span class="skel skel-line w40" style="width:48px;height:11px;"></span><div class="skel-body"><span class="skel skel-line"></span></div></div>
        <div class="skel-row"><span class="skel skel-line w40" style="width:48px;height:11px;"></span><div class="skel-body"><span class="skel skel-line"></span></div></div>
        <div class="skel-row"><span class="skel skel-line w40" style="width:48px;height:11px;"></span><div class="skel-body"><span class="skel skel-line"></span></div></div>
        <div class="skel-row"><span class="skel skel-line w40" style="width:48px;height:11px;"></span><div class="skel-body"><span class="skel skel-line"></span></div></div>
      </div>
    </section>

  </main>

  <div class="h-toast" id="hToast"></div>

  <script type="module" src="js/nav.js?v=26c"></script>
  <script type="module" src="js/hub.js?v=26c"></script>
</body>
</html>
