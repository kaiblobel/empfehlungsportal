<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Beleg · Empfehlungsprämie</title>
  <script src="js/config.js"></script>
  <style>
    :root {
      --ink:#1A1A1A; --muted:#6B6660; --line:#E2DDD3; --gold:#B08D2F; --bg:#F4F1EB;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:var(--font); background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased; padding:24px 16px 60px; }

    .beleg-actions { max-width:820px; margin:0 auto 16px; display:flex; gap:10px; justify-content:flex-end; }
    .beleg-btn { border:0; border-radius:999px; padding:11px 22px; font-size:14px; font-weight:600; cursor:pointer; font-family:var(--font); }
    .beleg-btn.print { background:#141414; color:#fff; }
    .beleg-btn.close { background:#fff; color:#1A1A1A; border:1px solid var(--line); }

    .doc { max-width:820px; margin:0 auto; background:#fff; border:1px solid var(--line);
           border-top:4px solid var(--gold); border-radius:4px; padding:48px 52px 40px;
           box-shadow:0 10px 40px rgba(20,18,12,.06); }

    .doc-head { display:flex; justify-content:space-between; align-items:flex-start; gap:24px; padding-bottom:22px; border-bottom:1px solid var(--line); }
    .doc-mark { width:46px; height:46px; border-radius:50%; background:linear-gradient(135deg,#C9B98A,#A8842F); color:#1A1A1A; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:17px; flex-shrink:0; }
    .doc-titleblock { text-align:right; }
    .doc-kicker { font-size:11px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--gold); }
    .doc-title { font-size:23px; font-weight:800; letter-spacing:-.01em; margin-top:2px; }
    .doc-nr { font-size:12.5px; color:var(--muted); margin-top:6px; }

    .doc-parties { display:grid; grid-template-columns:1fr 1fr; gap:30px; margin-top:28px; }
    .party-label { font-size:10.5px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-bottom:7px; }
    .party-body { font-size:14px; line-height:1.5; }
    .party-body strong { font-weight:700; }
    .party-body .line { color:var(--muted); }

    .doc-intro { margin-top:28px; font-size:14.5px; line-height:1.6; }

    .doc-table { width:100%; border-collapse:collapse; margin-top:18px; font-size:14px; }
    .doc-table td { padding:11px 0; border-bottom:1px solid var(--line); vertical-align:top; }
    .doc-table td:first-child { color:var(--muted); width:42%; }
    .doc-table td:last-child { text-align:right; font-weight:500; }
    .doc-table tr.total td { font-size:18px; font-weight:800; border-bottom:2px solid var(--ink); border-top:2px solid var(--ink); padding:13px 0; }

    .doc-sign { display:grid; grid-template-columns:1fr 1fr; gap:40px; margin-top:64px; }
    .sign-line { border-top:1px solid var(--ink); padding-top:7px; font-size:12px; color:var(--muted); }

    .doc-foot { margin-top:40px; padding-top:18px; border-top:1px solid var(--line); font-size:11.5px; color:var(--muted); line-height:1.6; text-align:center; }
    .doc-foot strong { color:var(--ink); font-weight:600; }

    @media (max-width:640px) {
      body { padding:14px 8px 40px; }
      .doc { padding:30px 22px; }
      .doc-parties, .doc-sign { grid-template-columns:1fr; gap:22px; }
      .doc-titleblock { text-align:left; }
      .doc-head { flex-direction:column; }
    }

    @media print {
      body { background:#fff; padding:0; }
      .beleg-actions { display:none !important; }
      .doc { max-width:none; margin:0; border:0; border-top:4px solid var(--gold); box-shadow:none; border-radius:0; padding:0 6mm; }
      @page { size:A4; margin:18mm; }
    }
  </style>
</head>
<body>
  <div class="beleg-actions">
    <button class="beleg-btn print" type="button" onclick="window.print()">Drucken / als PDF speichern</button>
    <button class="beleg-btn close" type="button" onclick="window.close()">Schließen</button>
  </div>

  <article class="doc" id="doc">
    <div class="doc-head">
      <div class="doc-mark" id="docMark">KB</div>
      <div class="doc-titleblock">
        <div class="doc-kicker">Empfehlungsprogramm</div>
        <div class="doc-title" id="docTitle">Quittung</div>
        <div class="doc-nr">Beleg-Nr. <span id="docNr">–</span> · <span id="docDate">–</span></div>
      </div>
    </div>

    <div class="doc-parties">
      <div>
        <div class="party-label">Aussteller</div>
        <div class="party-body" id="docAussteller">–</div>
      </div>
      <div>
        <div class="party-label">Empfänger</div>
        <div class="party-body" id="docEmpfaenger">–</div>
      </div>
    </div>

    <p class="doc-intro" id="docIntro">–</p>

    <table class="doc-table">
      <tbody id="docRows"></tbody>
    </table>

    <div class="doc-sign">
      <div class="sign-line" id="docSignEmpf">Empfänger · Datum, Unterschrift</div>
      <div class="sign-line" id="docSignAus">Aussteller · Datum, Unterschrift</div>
    </div>

    <div class="doc-foot" id="docFoot">–</div>
  </article>

  <script type="module" src="js/beleg.js?v=2"></script>
</body>
</html>
